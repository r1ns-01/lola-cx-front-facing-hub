<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="icon" href="favicon_io/favicon.ico">
<link rel="manifest" href="favicon_io/site.webmanifest">
<title>Lola Blankets — Training Hub 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sand: #F5EDE3;
  --cream: #FBF8F4;
  --caramel: #C4956A;
  --caramel-light: #D4AD85;
  --caramel-dark: #A57A52;
  --dune: #E8D5BF;
  --ivory: #FAF6F1;
  --charcoal: #2E2A26;
  --charcoal-soft: #4A4540;
  --warm-gray: #8C847C;
  --blush: #E8C4B0;
  --sage: #A8B5A0;
  --sage-light: #D4DDD0;
  --error: #C27070;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-soft: 0 2px 20px rgba(46,42,38,0.06);
  --shadow-card: 0 4px 30px rgba(46,42,38,0.08);
  --shadow-hover: 0 8px 40px rgba(46,42,38,0.12);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--charcoal);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── LOGIN SCREEN ─── */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--sand) 0%, var(--cream) 40%, var(--dune) 100%);
  position: relative;
  overflow: hidden;
}
.login-screen::before {
  content: '';
  position: absolute;
  top: -20%; right: -10%;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,149,106,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.login-screen::after {
  content: '';
  position: absolute;
  bottom: -15%; left: -5%;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168,181,160,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.login-card {
  background: white;
  border-radius: 24px;
  padding: 56px 48px;
  width: 420px;
  max-width: 90vw;
  box-shadow: var(--shadow-card);
  text-align: center;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-card .brand-icon {
  width: 64px; height: 64px;
  background: var(--sand);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px;
}
.login-card h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  color: var(--charcoal);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.login-card .subtitle {
  color: var(--warm-gray);
  font-size: 14px;
  margin-bottom: 32px;
}
.login-card label {
  display: block;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--warm-gray);
  margin-bottom: 8px;
}
.login-card select {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--dune);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--charcoal);
  background: var(--ivory);
  appearance: none;
  cursor: pointer;
  transition: var(--transition);
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238C847C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 16px center;
}
.login-card select:focus {
  outline: none;
  border-color: var(--caramel);
  box-shadow: 0 0 0 3px rgba(196,149,106,0.15);
}
.login-card .btn-primary {
  width: 100%;
  margin-top: 24px;
  padding: 15px;
  background: var(--charcoal);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.02em;
}
.login-card .btn-primary:hover {
  background: var(--caramel-dark);
  transform: translateY(-1px);
  box-shadow: var(--shadow-hover);
}

/* ─── APP SHELL ─── */
.app { display: none; min-height: 100vh; }
.app.active { display: flex; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 280px;
  min-height: 100vh;
  background: white;
  border-right: 1px solid var(--dune);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: var(--transition);
}
.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--dune);
}
.sidebar-header .brand {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--charcoal);
  letter-spacing: -0.02em;
}
.sidebar-header .user-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 6px 12px;
  background: var(--sand);
  border-radius: 20px;
  font-size: 13px;
  color: var(--charcoal-soft);
  font-weight: 500;
}
.sidebar-header .user-pill .avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--caramel);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  overflow-y: auto;
}
.nav-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--warm-gray);
  padding: 12px 12px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
  color: var(--charcoal-soft);
  font-weight: 500;
  position: relative;
}
.nav-item:hover { background: var(--sand); }
.nav-item.active { background: var(--sand); color: var(--charcoal); font-weight: 600; }
.nav-item .nav-icon { font-size: 16px; width: 22px; text-align: center; }
.nav-item .progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-left: auto;
  flex-shrink: 0;
}
.nav-item .progress-dot.complete { background: var(--sage); }
.nav-item .progress-dot.partial { background: var(--caramel-light); }
.nav-item .progress-dot.none { background: var(--dune); }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--dune);
}
.btn-logout {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 10px 12px;
  border: none;
  background: none;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--warm-gray);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.btn-logout:hover { background: var(--sand); color: var(--error); }

/* ─── MAIN CONTENT ─── */
.main {
  flex: 1;
  margin-left: 280px;
  min-height: 100vh;
}
.main-header {
  padding: 24px 40px;
  border-bottom: 1px solid var(--dune);
  background: white;
  position: sticky;
  top: 0;
  z-index: 50;
}
.main-header h2 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.main-header .breadcrumb {
  font-size: 12px;
  color: var(--warm-gray);
  margin-top: 4px;
}
.content-area {
  padding: 32px 40px;
  max-width: 900px;
}

/* ─── PAGE VIEWS ─── */
.page-view { display: none; }
.page-view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── WELCOME / OVERVIEW ─── */
.welcome-banner {
  background: linear-gradient(135deg, var(--sand) 0%, var(--dune) 100%);
  border-radius: var(--radius);
  padding: 36px 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.welcome-banner::after {
  content: '🛋️';
  position: absolute;
  right: 32px; top: 50%;
  transform: translateY(-50%);
  font-size: 64px;
  opacity: 0.3;
}
.welcome-banner h3 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
}
.welcome-banner p {
  color: var(--charcoal-soft);
  font-size: 14px;
  line-height: 1.6;
  max-width: 520px;
}

.progress-overview {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.day-card {
  background: white;
  border: 1px solid var(--dune);
  border-radius: var(--radius-sm);
  padding: 18px;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}
.day-card:hover {
  border-color: var(--caramel);
  box-shadow: var(--shadow-soft);
  transform: translateY(-2px);
}
.day-card .day-num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--caramel);
}
.day-card .day-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--warm-gray);
  margin-top: 2px;
}
.day-card .day-progress-bar {
  height: 4px;
  background: var(--dune);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}
.day-card .day-progress-bar .fill {
  height: 100%;
  background: var(--sage);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.day-card .day-pct {
  font-size: 12px;
  font-weight: 600;
  color: var(--charcoal-soft);
  margin-top: 6px;
}

/* ─── DAY CONTENT ─── */
.section-block {
  background: white;
  border: 1px solid var(--dune);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  transition: var(--transition);
}
.section-block:hover { box-shadow: var(--shadow-soft); }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.section-header .check-box {
  width: 22px; height: 22px;
  border: 2px solid var(--dune);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
  cursor: pointer;
  font-size: 13px;
  color: transparent;
}
.section-header .check-box.checked {
  background: var(--sage);
  border-color: var(--sage);
  color: white;
}
.section-header .section-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
}
.section-header .section-title.completed {
  text-decoration: line-through;
  color: var(--warm-gray);
}
.section-header .notion-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--sand);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--caramel-dark);
  text-decoration: none;
  transition: var(--transition);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.section-header .notion-link:hover {
  background: var(--caramel);
  color: white;
}
.day-notion-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 7px 14px;
  background: var(--sage);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  color: white;
  text-decoration: none;
  letter-spacing: 0.03em;
  transition: var(--transition);
}
.day-notion-link:hover {
  background: #8fa387;
  color: white;
}
.section-header .expand-btn {
  background: none; border: none;
  font-size: 16px;
  color: var(--warm-gray);
  cursor: pointer;
  transition: var(--transition);
  padding: 4px;
}
.section-body {
  display: none;
  padding: 0 20px 16px 54px;
  font-size: 13px;
  color: var(--charcoal-soft);
  line-height: 1.7;
}
.section-body.open { display: block; }
.section-body p { margin-bottom: 8px; }
.section-body a { color: var(--caramel-dark); text-decoration: underline; }
.section-body ul { padding-left: 18px; margin-bottom: 8px; }
.section-body ul li { margin-bottom: 4px; }

/* notes inside section */
.note-area {
  margin-top: 12px;
  border-top: 1px solid var(--dune);
  padding-top: 12px;
}
.note-area h5 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--warm-gray);
  margin-bottom: 8px;
}
.note-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.note-input-row textarea {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid var(--dune);
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 13px;
  resize: vertical;
  min-height: 40px;
  transition: var(--transition);
}
.note-input-row textarea:focus {
  outline: none;
  border-color: var(--caramel);
}
.note-input-row .btn-note {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.btn-private {
  background: var(--sand);
  color: var(--charcoal-soft);
}
.btn-private:hover { background: var(--dune); }
.btn-public {
  background: var(--caramel);
  color: white;
}
.btn-public:hover { background: var(--caramel-dark); }

.note-list { list-style: none; }
.note-list li {
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.5;
  position: relative;
}
.note-list li.private { background: var(--ivory); border-left: 3px solid var(--dune); }
.note-list li.public { background: #F0F5EE; border-left: 3px solid var(--sage); }
.note-list li .note-meta {
  font-size: 11px;
  color: var(--warm-gray);
  margin-top: 4px;
}
.note-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-left: 4px;
}
.note-badge.private-badge { background: var(--dune); color: var(--charcoal-soft); }
.note-badge.public-badge { background: var(--sage-light); color: #5A6E52; }

.note-delete {
  position: absolute;
  top: 8px; right: 8px;
  background: none; border: none;
  color: var(--warm-gray);
  cursor: pointer;
  font-size: 14px;
  opacity: 0;
  transition: var(--transition);
}
.note-list li:hover .note-delete { opacity: 1; }
.note-delete:hover { color: var(--error); }

/* ─── NOTE REACTIONS ─── */
.note-reactions {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.reaction-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1.5px solid var(--dune);
  background: white;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: var(--transition);
  color: var(--charcoal-soft);
  line-height: 1;
}
.reaction-btn:hover { background: var(--sand); border-color: var(--caramel-light); }
.reaction-btn.reacted {
  background: var(--sand);
  border-color: var(--caramel);
  color: var(--caramel-dark);
  font-weight: 600;
}
.reaction-btn .reaction-count {
  font-size: 11px;
  font-weight: 600;
  min-width: 10px;
}
.reaction-btn { position: relative; }
.reaction-btn[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(40,35,30,0.88);
  color: #fff;
  padding: 4px 9px;
  border-radius: 6px;
  font-size: 11px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  font-weight: 400;
}
.reaction-btn[data-tooltip]:hover::after { opacity: 1; }

/* ─── TEAM DASHBOARD ─── */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.team-member-card {
  background: white;
  border: 1px solid var(--dune);
  border-radius: var(--radius-sm);
  padding: 20px;
  transition: var(--transition);
}
.team-member-card:hover { box-shadow: var(--shadow-soft); }
.team-member-card .tm-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.tm-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--caramel);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  font-family: var(--font-display);
}
.tm-name { font-weight: 600; font-size: 15px; }
.tm-overall {
  font-size: 12px;
  color: var(--warm-gray);
}
.tm-days {
  display: flex;
  gap: 6px;
}
.tm-day-dot {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: var(--dune);
  transition: var(--transition);
}
.tm-day-dot.complete { background: var(--sage); }
.tm-day-dot.partial { background: var(--caramel-light); }

/* ─── KEY LINKS ─── */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.link-card {
  background: white;
  border: 1px solid var(--dune);
  border-radius: var(--radius-sm);
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: var(--charcoal);
  transition: var(--transition);
}
.link-card:hover {
  border-color: var(--caramel);
  box-shadow: var(--shadow-soft);
  transform: translateY(-1px);
}
.link-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.link-card .link-title { font-weight: 600; font-size: 14px; }
.link-card .link-desc { font-size: 12px; color: var(--warm-gray); margin-top: 2px; }

/* ─── CALLOUT ─── */
.callout {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px 18px;
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.6;
}
.callout.break { background: #F5F0E8; border: 1px solid var(--dune); }
.callout.quiz { background: #F0F5EE; border: 1px solid var(--sage-light); }
.callout .callout-icon { font-size: 18px; flex-shrink: 0; }

/* ─── RESPONSIVE ─── */
@media (max-width: 860px) {
  .sidebar { width: 240px; }
  .main { margin-left: 240px; }
  .content-area { padding: 24px 20px; }
  .progress-overview { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 640px) {
  .sidebar {
    transform: translateX(-100%);
    width: 280px;
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .main-header { padding: 16px 20px; }
  .progress-overview { grid-template-columns: repeat(2, 1fr); }
  .team-grid { grid-template-columns: 1fr; }
}

/* ─── LOADING STATE ─── */
.loading-spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--dune);
  border-top-color: var(--caramel);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--warm-gray);
  font-size: 14px;
}

async function loadProgress() {
  try {
    const { data } = await sb.from('training_progress').select('*').eq('user_name', currentUser);
    progressData = {};
    if (data) data.forEach(r => { progressData[r.section_id] = r.completed; });
  } catch(e) { console.warn('Progress load failed, using local', e); }
}

async function loadAllProgress() {
  try {
    const { data } = await sb.from('training_progress').select('*');
    allProgress = {};
    if (data) data.forEach(r => {
      if (!allProgress[r.user_name]) allProgress[r.user_name] = {};
      allProgress[r.user_name][r.section_id] = r.completed;
    });
  } catch(e) { console.warn('All progress load failed', e); }
}

async function loadNotes() {
  try {
    const { data } = await sb.from('training_notes').select('*').order('created_at', { ascending: false });
    allNotes = data || [];
  } catch(e) { console.warn('Notes load failed', e); allNotes = []; }
}

async function loadNoteReactions() {
  try {
    const { data } = await sb.from('note_reactions').select('*');
    noteReactions = data || [];
  } catch(e) { console.warn('Reactions load failed', e); noteReactions = []; }
}

const REACTION_DEFS = [
  { type: 'thumbsup', emoji: '👍' },
  { type: 'heart',    emoji: '❤️' },
  { type: 'ok',       emoji: '👌' },
  { type: 'thanks',   emoji: '🙏' },
];

function renderNoteReactions(noteId) {
  return `<div class="note-reactions" id="reactions_${noteId}">` +
    REACTION_DEFS.map(({ type, emoji }) => {
      const reactors = noteReactions.filter(r => String(r.note_id) === String(noteId) && r.reaction_type === type).map(r => r.user_name);
      const reacted = reactors.includes(currentUser);
      const count = reactors.length;
      const tooltip = count > 0 ? reactors.join(', ') : emoji;
      return `<button class="reaction-btn ${reacted ? 'reacted' : ''}" onclick="toggleReaction(${noteId},'${type}')" data-tooltip="${tooltip}">
        ${emoji}<span class="reaction-count">${count > 0 ? count : ''}</span>
      </button>`;
    }).join('') +
  `</div>`;
}

async function toggleReaction(noteId, type) {
  const existing = noteReactions.find(r => String(r.note_id) === String(noteId) && r.user_name === currentUser && r.reaction_type === type);
  if (existing) {
    noteReactions = noteReactions.filter(r => r !== existing);
    try { await sb.from('note_reactions').delete().eq('id', existing.id); } catch(e) { console.warn('Reaction delete failed', e); }
  } else {
    const newReaction = { note_id: noteId, user_name: currentUser, reaction_type: type };
    try {
      const { data } = await sb.from('note_reactions').insert(newReaction).select();
      noteReactions.push(data ? data[0] : { ...newReaction, id: Date.now() });
    } catch(e) {
      console.warn('Reaction insert failed', e);
      noteReactions.push({ ...newReaction, id: Date.now() });
    }

    // Notify note author if it's not the reactor's own note
    const note = allNotes.find(n => String(n.id) === String(noteId));
    if (note && note.user_name !== currentUser) {
      const emojiMap = { thumbsup: '👍', heart: '❤️', ok: '👌', thanks: '🙏' };
      const notifText = `[react:${type}] ${note.note_text}`;
      try {
        await sb.from('training_notifications').insert({
          recipient: note.user_name,
          sender: currentUser,
          section_id: note.section_id,
          note_text: notifText
        });
      } catch(e) { console.warn('Reaction notification failed', e); }
    }
  }
  const bar = document.getElementById('reactions_' + noteId);
  if (bar) bar.outerHTML = renderNoteReactions(noteId);
}

async function loadNotifications() {
  try {
    const { data } = await sb.from('training_notifications')
      .select('*').eq('recipient', currentUser).order('created_at', { ascending: false });
    notifications = data || [];
  } catch(e) { console.warn('Notifications load failed', e); notifications = []; }
}

function parseMentions(text) {
  const matches = [...text.matchAll(/@(\w+)/g)].map(m => m[1]);
  return [...new Set(matches)].filter(name => TEAM_MEMBERS.includes(name) && name !== currentUser);
}

async function markNotificationsRead() {
  const hasUnread = notifications.some(n => !n.read);
  if (!hasUnread) return;
  notifications.forEach(n => n.read = true);
  updateNotificationBadge();
  try {
    await sb.from('training_notifications').update({ read: true })
      .eq('recipient', currentUser).eq('read', false);
  } catch(e) { console.warn('Mark read failed', e); }
}

function updateNotificationBadge() {
  const badge = document.getElementById('notifBadge');
  if (!badge) return;
  const count = notifications.filter(n => !n.read).length;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

async function toggleSection(sectionId) {
  const newVal = !progressData[sectionId];
  progressData[sectionId] = newVal;
  if (!allProgress[currentUser]) allProgress[currentUser] = {};
  allProgress[currentUser][sectionId] = newVal;
  renderCurrentPage();
  updateSidebarDots();

  try {
    if (newVal) {
      await sb.from('training_progress').upsert({
        user_name: currentUser, section_id: sectionId, completed: true
      }, { onConflict: 'user_name,section_id' });
    } else {
      await sb.from('training_progress').delete().eq('user_name', currentUser).eq('section_id', sectionId);
    }
  } catch(e) { console.warn('Toggle save failed', e); }
}

async function saveNote(sectionId, text, isPublic) {
  const note = {
    user_name: currentUser,
    section_id: sectionId,
    note_text: text,
    is_public: isPublic,
    created_at: new Date().toISOString()
  };
  try {
    const { data } = await sb.from('training_notes').insert(note).select();
    if (data && data[0]) allNotes.unshift(data[0]);
    else allNotes.unshift({ ...note, id: Date.now() }); // fallback
  } catch(e) {
    allNotes.unshift({ ...note, id: Date.now() });
  }

  // Insert notifications for any @mentions
  const mentioned = parseMentions(text);
  if (mentioned.length > 0) {
    const notifRows = mentioned.map(name => ({
      recipient: name, sender: currentUser,
      section_id: sectionId, note_text: text
    }));
    try {
      await sb.from('training_notifications').insert(notifRows);
    } catch(e) { console.warn('Notification insert failed', e); }
  }

  renderCurrentPage();
}

async function deleteNote(noteId) {
  allNotes = allNotes.filter(n => n.id !== noteId);
  renderCurrentPage();
  try { await sb.from('training_notes').delete().eq('id', noteId); } catch(e) {}
}

let currentPage = 'overview';

function navigate(page) {
  currentPage = page;
  renderCurrentPage();
  updateSidebarActive();
  // scroll to top
  document.getElementById('contentArea').scrollTo?.({ top: 0 });
  window.scrollTo({ top: 0 });
}

function navigateToSection(dayId, sectionId) {
  navigate(dayId);
  setTimeout(() => {
    const body = document.getElementById('body_' + sectionId);
    if (!body) return;
    body.classList.add('open');
    body.closest('.section-block').scrollIntoView({ behavior: 'smooth', block: 'start' });
    const ta = document.getElementById('note_input_' + sectionId);
    if (ta) ta.focus();
  }, 80);
}

function toggleReplyBox(notifId) {
  const box = document.getElementById('reply_' + notifId);
  if (!box) return;
  const isOpen = box.style.display !== 'none';
  box.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) {
    const n = notifications.find(n => String(n.id) === String(notifId));
    const ta = document.getElementById('reply_input_' + notifId);
    if (ta && n) {
      if (!ta.value) ta.value = '@' + n.sender + ' ';
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }
}

async function sendReply(notifId, sectionId, senderName) {
  const ta = document.getElementById('reply_input_' + notifId);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const btn = ta.closest('.notif-reply-box').querySelector('.notif-send-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;
  await saveNote(sectionId, text, true);
  ta.value = '';
  document.getElementById('reply_' + notifId).style.display = 'none';
}

function updateSidebarActive() {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === currentPage);
  });
}

function updateSidebarDots() {
  COURSE.forEach(day => {
    const dot = document.querySelector(`.nav-item[data-page="${day.id}"] .progress-dot`);
    if (!dot) return;
    const total = day.sections.length;
    const done = day.sections.filter(s => progressData[s.id]).length;
    dot.className = 'progress-dot ' + (done === total ? 'complete' : done > 0 ? 'partial' : 'none');
  });
}

function renderCurrentPage() {
  const area = document.getElementById('contentArea');
  const title = document.getElementById('pageTitle');
  const bc = document.getElementById('breadcrumb');

  // Preserve which section bodies are currently open
  const openBodyIds = [...document.querySelectorAll('.section-body.open')].map(el => el.id);

  if (currentPage === 'overview') {
    title.textContent = 'Overview';
    bc.textContent = 'Training Hub';
    area.innerHTML = renderOverview();
  } else if (currentPage === 'team') {
    title.textContent = 'Team Progress';
    bc.textContent = 'Training Hub → Team';
    area.innerHTML = renderTeam();
  } else if (currentPage === 'notifications') {
    title.textContent = 'Notifications';
    bc.textContent = 'Training Hub → Notifications';
    area.innerHTML = renderNotifications();
    markNotificationsRead();
  } else if (currentPage === 'links') {
    title.textContent = 'Key Links';
    bc.textContent = 'Training Hub → Resources';
    area.innerHTML = renderLinks();
  } else if (currentPage === 'comments-hub' && currentUser === 'Ivan') {
    title.textContent = 'Comments Hub';
    bc.textContent = 'Training Hub → Admin → Comments Hub';
    area.innerHTML = renderCommentsHub();
  } else {
    const day = COURSE.find(d => d.id === currentPage);
    if (day) {
      title.textContent = day.title;
      bc.textContent = `Training Hub → Day ${day.day}`;
      area.innerHTML = renderDay(day);
    }
  }

  // Restore open sections after re-render
  openBodyIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('open');
  });
  updateSidebarDots();
}

function getDayProgress(day) {
  const total = day.sections.length;
  const done = day.sections.filter(s => progressData[s.id]).length;
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}

function renderOverview() {
  let cardsHtml = COURSE.map(day => {
    const p = getDayProgress(day);
    return `
      <div class="day-card" onclick="navigate('${day.id}')">
        <div class="day-num">${day.day}</div>
        <div class="day-label">Day ${day.day}</div>
        <div class="day-progress-bar"><div class="fill" style="width:${p.pct}%"></div></div>
        <div class="day-pct">${p.done}/${p.total} complete</div>
      </div>
    `;
  }).join('');

  const totalSections = COURSE.reduce((s, d) => s + d.sections.length, 0);
  const totalDone = COURSE.reduce((s, d) => s + d.sections.filter(sec => progressData[sec.id]).length, 0);
  const overallPct = totalSections > 0 ? Math.round((totalDone / totalSections) * 100) : 0;

  return `
    <div class="welcome-banner">
      <h3>Welcome back, ${currentUser}!</h3>
      <p>You're ${overallPct}% through the training (${totalDone}/${totalSections} sections). Pick up where you left off or explore a new day.</p>
    </div>
    <div class="progress-overview">${cardsHtml}</div>
    <a href="https://lolablankets.notion.site/Welcome-to-Lola-Blankets-2026-Training-30abbc9c4dde802da267f3f8ce5f3fbd" target="_blank" class="link-card" style="margin-top:8px;">
      <div class="link-icon" style="background:var(--sand);">📋</div>
      <div>
        <div class="link-title">Open Full Training in Notion</div>
        <div class="link-desc">View the original training document with all embedded content</div>
      </div>
    </a>
  `;
}

function renderDay(day) {
  const p = getDayProgress(day);
  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="font-size:13px;color:var(--warm-gray);margin-bottom:4px;">${p.done} of ${p.total} sections completed</div>
        <div style="width:200px;height:6px;background:var(--dune);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${p.pct}%;background:var(--sage);border-radius:3px;transition:width 0.4s ease;"></div>
        </div>
      </div>
      <a href="${day.notionUrl}" target="_blank" class="day-notion-link">
        Open in Notion ↗
      </a>
    </div>
  `;

  day.sections.forEach(sec => {
    const checked = progressData[sec.id] ? 'checked' : '';
    const completedClass = progressData[sec.id] ? 'completed' : '';
    const sectionNotes = allNotes.filter(n => n.section_id === sec.id && (n.is_public || n.user_name === currentUser));

    let linkHtml = '';
    if (sec.link) {
      linkHtml = `<a href="${sec.link}" target="_blank" class="notion-link" onclick="event.stopPropagation();">Open ↗</a>`;
    }

    let notesHtml = '';
    if (sectionNotes.length > 0) {
      notesHtml = sectionNotes.map(n => {
        const cls = n.is_public ? 'public' : 'private';
        const badge = n.is_public
          ? '<span class="note-badge public-badge">Public</span>'
          : '<span class="note-badge private-badge">Private</span>';
        const canDelete = n.user_name === currentUser;
        const deleteBtn = canDelete ? `<button class="note-delete" onclick="deleteNote(${n.id})" title="Delete">✕</button>` : '';
        const time = new Date(n.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
        const reactionsHtml = n.is_public ? renderNoteReactions(n.id) : '';
        return `
          <li class="${cls}">
            ${deleteBtn}
            ${n.note_text}
            <div class="note-meta">${n.user_name} · ${time} ${badge}</div>
            ${reactionsHtml}
          </li>
        `;
      }).join('');
    }

    html += `
      <div class="section-block">
        <div class="section-header">
          <div class="check-box ${checked}" onclick="event.stopPropagation();toggleSection('${sec.id}')">✓</div>
          <span class="section-title ${completedClass}" onclick="toggleExpand(this)">${sec.isQuiz ? '' : ''}${sec.title}</span>
          ${linkHtml}
          <button class="expand-btn" onclick="toggleExpand(this)">▾</button>
        </div>
        <div class="section-body" id="body_${sec.id}">
          <p>${sec.desc}</p>
          <div class="note-area">
            <h5>Notes</h5>
            <div class="note-input-row">
              <textarea id="note_input_${sec.id}" placeholder="Write a note…"></textarea>
              <button class="btn-note btn-private" onclick="submitNote('${sec.id}', false)">🔒 Private</button>
              <button class="btn-note btn-public" onclick="submitNote('${sec.id}', true)">🌐 Public</button>
            </div>
            <ul class="note-list">${notesHtml}</ul>
          </div>
        </div>
      </div>
    `;
  });

  const anyChecked = day.sections.some(s => progressData[s.id]);
  if (anyChecked) {
    html += `<button class="btn-clear-day" onclick="clearDayProgress('${day.id}')">Clear All Progress for Day ${day.day}</button>`;
  }

  return html;
}

function renderTeam() {
  let html = '<div class="team-grid">';
  TEAM_MEMBERS.forEach((name, i) => {
    const userProg = allProgress[name] || {};
    const totalSections = COURSE.reduce((s, d) => s + d.sections.length, 0);
    const done = Object.values(userProg).filter(Boolean).length;
    const pct = totalSections > 0 ? Math.round((done / totalSections) * 100) : 0;

    const dayDots = COURSE.map(day => {
      const dayTotal = day.sections.length;
      const dayDone = day.sections.filter(s => userProg[s.id]).length;
      const cls = dayDone === dayTotal ? 'complete' : dayDone > 0 ? 'partial' : '';
      return `<div class="tm-day-dot ${cls}" title="Day ${day.day}: ${dayDone}/${dayTotal}"></div>`;
    }).join('');

    const isMe = name === currentUser;

    html += `
      <div class="team-member-card" style="${isMe ? 'border-color:var(--caramel);' : ''}">
        <div class="tm-header">
          <div class="tm-avatar" style="background:${AVATAR_COLORS[i]}">${name[0]}</div>
          <div>
            <div class="tm-name">${name} ${isMe ? '(you)' : ''}</div>
            <div class="tm-overall">${pct}% complete · ${done} sections</div>
          </div>
        </div>
        <div class="tm-days">${dayDots}</div>
      </div>
    `;
  });
  html += '</div>';
  return html;
}

function renderNotifications() {
  if (notifications.length === 0) {
    return `
      <div class="notif-empty">
        <div class="notif-empty-icon">🔔</div>
        <p>No notifications yet.<br>You'll be notified when a teammate mentions you in a note.</p>
      </div>
    `;
  }

  const items = notifications.map(n => {
    const senderIdx = TEAM_MEMBERS.indexOf(n.sender);
    const avatarColor = senderIdx >= 0 ? AVATAR_COLORS[senderIdx] : 'var(--warm-gray)';
    const unreadClass = n.read ? '' : 'unread';

    // Look up section/day name and dayId
    let context = n.section_id;
    let dayId = '';
    for (const day of COURSE) {
      const sec = day.sections.find(s => s.id === n.section_id);
      if (sec) { context = `Day ${day.day} · ${sec.title}`; dayId = day.id; break; }
    }

    // Bold @mentions in note text
    // Detect reaction notifications vs mention notifications
    const reactionMatch = n.note_text.match(/^\[react:(\w+)\] ([\s\S]*)$/);
    const emojiMap = { thumbsup: '👍', heart: '❤️', ok: '👌', thanks: '🙏' };
    let metaLabel, displayText;
    if (reactionMatch) {
      const [, rType, originalText] = reactionMatch;
      metaLabel = `${n.sender} reacted ${emojiMap[rType] || '🙂'} to your note`;
      displayText = originalText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    } else {
      metaLabel = `${n.sender} mentioned you`;
      const safeText = n.note_text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      displayText = safeText.replace(/@(\w+)/g, (_, name) =>
        TEAM_MEMBERS.includes(name) ? `<strong>@${name}</strong>` : `@${name}`
      );
    }

    const time = new Date(n.created_at).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });

    return `
      <div class="notif-item ${unreadClass}" data-notif-id="${n.id}">
        <div class="notif-checkbox-wrap">
          <input type="checkbox" class="notif-select-cb" data-id="${n.id}" onchange="updateBulkBar()">
        </div>
        <div class="notif-avatar" style="background:${avatarColor}">${n.sender[0]}</div>
        <div class="notif-body">
          <div class="notif-meta">${metaLabel}</div>
          <div class="notif-context">${context}</div>
          <div class="notif-text">${displayText}</div>
          <div class="notif-actions">
            <button class="notif-reply-btn" onclick="toggleReplyBox('${n.id}')">↩ Reply</button>
            ${dayId ? `<button class="notif-goto-btn" onclick="navigateToSection('${dayId}','${n.section_id}')">Go to section ↗</button>` : ''}
            <button class="notif-delete-btn" onclick="deleteNotification('${n.id}')">✕ Remove</button>
          </div>
          <div class="notif-reply-box" id="reply_${n.id}" style="display:none">
            <textarea id="reply_input_${n.id}" placeholder="Write a reply…" rows="3"></textarea>
            <div class="notif-reply-row">
              <button class="notif-cancel-btn" onclick="toggleReplyBox('${n.id}')">Cancel</button>
              <button class="notif-send-btn" onclick="sendReply('${n.id}','${n.section_id}','${n.sender}')">Send Reply</button>
            </div>
          </div>
        </div>
        <div class="notif-time">${time}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="notif-bulk-bar">
      <label>
        <input type="checkbox" id="notifSelectAll" onchange="toggleSelectAll(this.checked)">
        Select all
      </label>
      <button class="notif-bulk-delete-btn" id="bulkDeleteBtn" onclick="deleteSelectedNotifications()" disabled>Delete selected</button>
    </div>
    <div class="notif-list">${items}</div>
  `;
}

function updateBulkBar() {
  const cbs = document.querySelectorAll('.notif-select-cb');
  const checked = document.querySelectorAll('.notif-select-cb:checked');
  const bulkBtn = document.getElementById('bulkDeleteBtn');
  const selectAll = document.getElementById('notifSelectAll');
  if (bulkBtn) bulkBtn.disabled = checked.length === 0;
  if (selectAll) selectAll.checked = cbs.length > 0 && checked.length === cbs.length;
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.notif-select-cb').forEach(cb => cb.checked = checked);
  updateBulkBar();
}

async function deleteNotification(id) {
  notifications = notifications.filter(n => String(n.id) !== String(id));
  updateNotificationBadge();
  const el = document.querySelector(`.notif-item[data-notif-id="${id}"]`);
  if (el) el.remove();
  const list = document.querySelector('.notif-list');
  if (list && !list.querySelector('.notif-item')) {
    document.querySelector('.notif-bulk-bar')?.remove();
    list.innerHTML = `<div class="notif-empty"><div class="notif-empty-icon">🔔</div><p>No notifications yet.<br>You'll be notified when a teammate mentions you in a note.</p></div>`;
  }
  updateBulkBar();
  try {
    await sb.from('training_notifications').delete().eq('id', id);
  } catch(e) { console.warn('Delete notification failed', e); }
}

async function deleteSelectedNotifications() {
  const checked = [...document.querySelectorAll('.notif-select-cb:checked')];
  if (!checked.length) return;
  const ids = checked.map(cb => cb.dataset.id);
  for (const id of ids) await deleteNotification(id);
}

function renderCommentsHub() {
  const publicNotes = allNotes.filter(n => n.is_public);

  // Build section lookup
  const sectionMap = {};
  COURSE.forEach(day => {
    day.sections.forEach(sec => {
      sectionMap[sec.id] = { title: sec.title, day: day.day };
    });
  });

  // Filter controls state (read from DOM if exists)
  const filterUser = typeof _hubFilterUser !== 'undefined' ? _hubFilterUser : '';
  const filterDay  = typeof _hubFilterDay  !== 'undefined' ? _hubFilterDay  : '';

  let filtered = publicNotes;
  if (filterUser) filtered = filtered.filter(n => n.user_name === filterUser);
  if (filterDay)  filtered = filtered.filter(n => {
    const sec = sectionMap[n.section_id];
    return sec && String(sec.day) === filterDay;
  });

  const authors = [...new Set(publicNotes.map(n => n.user_name))].sort();
  const days = [...new Set(COURSE.map(d => d.day))];

  const userOptions = authors.map(u =>
    `<option value="${u}" ${filterUser === u ? 'selected' : ''}>${u}</option>`
  ).join('');

  const dayOptions = days.map(d =>
    `<option value="${d}" ${filterDay === String(d) ? 'selected' : ''}>Day ${d}</option>`
  ).join('');

  const notesHtml = filtered.length === 0
    ? `<div style="text-align:center;color:var(--warm-gray);padding:3rem 0;">No public comments found.</div>`
    : filtered.map(n => {
        const sec = sectionMap[n.section_id];
        const secLabel = sec ? `Day ${sec.day} — ${sec.title}` : n.section_id;
        const time = new Date(n.created_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
        const idx = TEAM_MEMBERS.indexOf(n.user_name);
        const avatarColor = idx >= 0 ? AVATAR_COLORS[idx] : 'var(--warm-gray)';
        const reactionSummary = REACTION_DEFS.map(({ type, emoji }) => {
          const count = noteReactions.filter(r => String(r.note_id) === String(n.id) && r.reaction_type === type).length;
          return count > 0 ? `${emoji} ${count}` : '';
        }).filter(Boolean).join('  ');
        return `
          <div style="background:white;border:1px solid var(--linen);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:0.85rem;">
            <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;">
              <div style="width:30px;height:30px;border-radius:50%;background:${avatarColor};color:white;font-weight:700;font-size:0.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${n.user_name[0]}</div>

                <span style="color:var(--warm-gray);font-size:0.8rem;margin-left:0.5rem;">${time}</span>

            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.25rem;">
              <span style="font-size:0.78rem;color:var(--sage);background:#f0f5ee;padding:0.2rem 0.6rem;border-radius:20px;">📖 ${secLabel}</span>
              ${reactionSummary ? `<span style="font-size:0.85rem;color:var(--warm-gray);">${reactionSummary}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');

  return `
    <div style="max-width:720px;">
      <p style="color:var(--warm-gray);margin:0 0 1.25rem;font-size:0.95rem;">
        All public comments from all team members — ${publicNotes.length} total.
      </p>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;">
        <select onchange="_hubFilterUser=this.value;renderCurrentPage()" style="padding:0.5rem 0.75rem;border:1.5px solid var(--linen);border-radius:8px;background:white;color:var(--espresso);font-size:0.9rem;">

        <select onchange="_hubFilterDay=this.value;renderCurrentPage()" style="padding:0.5rem 0.75rem;border:1.5px solid var(--linen);border-radius:8px;background:white;color:var(--espresso);font-size:0.9rem;">
          <option value="">All days</option>
          ${dayOptions}
        </select>
        ${(filterUser || filterDay) ? `<button onclick="_hubFilterUser='';_hubFilterDay='';renderCurrentPage()" style="padding:0.5rem 0.9rem;border:1.5px solid var(--linen);background:white;color:var(--warm-gray);border-radius:8px;cursor:pointer;font-size:0.85rem;">✕ Clear filters</button>` : ''}

  `;
}

let _pendingClearDayId = null;

function clearDayProgress(dayId) {
  const day = COURSE.find(d => d.id === dayId);
  const checked = day.sections.filter(s => progressData[s.id]).length;
  if (checked === 0) return;
  _pendingClearDayId = dayId;
  document.getElementById('modalTitle').textContent = `Clear Day ${day.day} progress?`;
  document.getElementById('modalBody').textContent =
    `This will remove all ${checked} completed check${checked !== 1 ? 's' : ''} for "${day.title}". This cannot be undone.`;
  document.getElementById('confirmModal').style.display = 'flex';
}

function dismissModal() {
  document.getElementById('confirmModal').style.display = 'none';
  _pendingClearDayId = null;
}

function closeModal(e) {
  if (e.target === document.getElementById('confirmModal')) dismissModal();
}

async function confirmClearDay() {
  const dayId = _pendingClearDayId;
  dismissModal();
  if (!dayId) return;
  const day = COURSE.find(d => d.id === dayId);
  const sectionIds = day.sections.map(s => s.id);

  sectionIds.forEach(id => {
    progressData[id] = false;
    if (allProgress[currentUser]) allProgress[currentUser][id] = false;
  });
  renderCurrentPage();
  updateSidebarDots();

  try {
    await sb.from('training_progress')
      .delete()
      .eq('user_name', currentUser)
      .in('section_id', sectionIds);
  } catch(e) { console.warn('Clear day failed', e); }
}

// ═══════════════════════════════════════════════════
// @MENTION AUTOCOMPLETE
// ═══════════════════════════════════════════════════
(function() {
  let dropdown = null;
  let activeTextarea = null;
  let mentionStart = -1;

  function createDropdown() {
    if (dropdown) return;
    dropdown = document.createElement('div');
    dropdown.className = 'mention-dropdown';
    dropdown.style.display = 'none';
    document.body.appendChild(dropdown);
  }

  function hideDropdown() {
    if (dropdown) dropdown.style.display = 'none';
    mentionStart = -1;
    activeTextarea = null;
  }

  function getMentionQuery(ta) {
    const val = ta.value;
    const pos = ta.selectionStart;
    const before = val.slice(0, pos);
    const match = before.match(/@(\w*)$/);
    return match ? { query: match[1], atPos: pos - match[0].length } : null;
  }

  function showDropdown(ta, query, atPos) {
    createDropdown();
    activeTextarea = ta;
    mentionStart = atPos;

    const matches = TEAM_MEMBERS.filter(n =>
      n !== currentUser && n.toLowerCase().startsWith(query.toLowerCase())
    );

    if (matches.length === 0) { hideDropdown(); return; }

    dropdown.innerHTML = matches.slice(0, 6).map((name, i) => {
      const idx = TEAM_MEMBERS.indexOf(name);
      const color = idx >= 0 ? AVATAR_COLORS[idx] : 'var(--warm-gray)';
      return `<div class="mention-dropdown-item" data-name="${name}">
        <span class="md-avatar" style="background:${color}">${name[0]}</span>${name}
      </div>`;
    }).join('');

    const rect = ta.getBoundingClientRect();
    dropdown.style.top = (rect.bottom + 4) + 'px';
    dropdown.style.left = rect.left + 'px';
    dropdown.style.display = 'block';
  }

  function insertMention(name) {
    if (!activeTextarea) return;
    const val = activeTextarea.value;
    const pos = activeTextarea.selectionStart;
    const before = val.slice(0, mentionStart);
    const after = val.slice(pos);
    activeTextarea.value = before + '@' + name + ' ' + after;
    const newPos = mentionStart + name.length + 2;
    activeTextarea.setSelectionRange(newPos, newPos);
    activeTextarea.focus();
    hideDropdown();
  }

  document.addEventListener('DOMContentLoaded', () => {
    createDropdown();

    document.getElementById('contentArea').addEventListener('input', e => {
      if (e.target.tagName !== 'TEXTAREA') return;
      const result = getMentionQuery(e.target);
      if (result) showDropdown(e.target, result.query, result.atPos);
      else hideDropdown();
    });

    document.addEventListener('click', e => {
      const item = e.target.closest('.mention-dropdown-item');
      if (item) { insertMention(item.dataset.name); return; }
      if (dropdown && !dropdown.contains(e.target)) hideDropdown();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hideDropdown();
    });
  });
})();
